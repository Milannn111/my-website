<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Console | Master Control Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: Inter, system-ui, sans-serif; color: #1e293b; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 15px 35px -5px rgba(0,0,0,0.05); }
        .stat-bar { height: 8px; border-radius: 10px; background: #f1f5f9; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s ease; }
        .alert-pulse { border: 2px solid #6366f1; animation: alertShadow 2s infinite; }
        @keyframes alertShadow { 0% { box-shadow: 0 0 0 0 rgba(99,102,241,0.4); } 70% { box-shadow: 0 0 0 15px rgba(99,102,241,0); } 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        <nav class="bg-slate-900 text-white rounded-[2.5rem] p-6 shadow-2xl flex justify-between items-center animate__animated animate__fadeInDown">
            <div class="flex items-center gap-5">
                <div class="bg-indigo-600 p-4 rounded-2xl"><i class="fas fa-crown text-2xl"></i></div>
                <h1 class="text-2xl font-black uppercase tracking-tighter">EduPet <span class="text-indigo-400">Master</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="syncStatus" class="hidden text-[10px] font-black text-indigo-300 uppercase tracking-widest">Syncing</span>
                <button onclick="loadDashboard()" class="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center hover:bg-indigo-600 transition"><i class="fas fa-sync-alt"></i></button>
            </div>
        </nav>

        <section class="glass-card p-8 border-t-8 border-indigo-600 animate__animated animate__fadeInUp">
            <h3 class="font-black text-lg uppercase mb-6 flex items-center gap-3"><i class="fas fa-scroll text-indigo-600"></i> Deploy Neural Directive</h3>
            <div class="grid grid-cols-1 md:grid-cols-[1fr_170px_120px_auto] gap-4">
                <input type="text" id="taskContent" placeholder="Enter objective (e.g., Complete Quiz 5)..." class="flex-grow bg-slate-50 border border-slate-200 rounded-2xl px-6 py-5 text-base focus:border-indigo-500 outline-none font-bold transition">
                <select id="rewardType" class="bg-slate-50 border border-slate-200 rounded-2xl px-5 py-5 text-base focus:border-indigo-500 outline-none font-bold transition">
                    <option value="cookie">🍪 Cookie</option>
                    <option value="candy">🍬 Candy</option>
                    <option value="apple">🍎 Apple</option>
                </select>
                <input type="number" id="rewardCount" min="1" max="99" value="1" class="bg-slate-50 border border-slate-200 rounded-2xl px-5 py-5 text-base focus:border-indigo-500 outline-none font-bold transition">
                <button onclick="publishQuest()" class="bg-indigo-600 text-white px-10 py-5 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl">Broadcast</button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8">
                <section class="glass-card p-8 h-full animate__animated animate__fadeInUp">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="font-black text-sm uppercase tracking-widest flex items-center gap-2"><i class="fas fa-clipboard-check text-indigo-500"></i> Individual Approval</h3>
                        <span id="pendingCount" class="bg-indigo-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full">0 PENDING</span>
                    </div>
                    <div id="submissionList" class="space-y-4 min-h-[400px]">
                        <div class="text-center py-20 opacity-20 font-black text-xs uppercase tracking-[0.4em]">Awaiting Proof...</div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <section class="glass-card p-8 animate__animated animate__fadeInRight">
                    <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-8">Student Status</h3>
                    <div id="analyticsGrid" class="space-y-6 max-h-[300px] overflow-y-auto no-scrollbar"></div>
                </section>

                <section class="glass-card p-8 animate__animated animate__fadeInRight">
                    <h3 class="font-black text-xs uppercase tracking-widest text-pink-400 mb-6">Master Speech</h3>
                    <textarea id="socialText" placeholder="Encourage everyone..." class="w-full h-24 bg-slate-50 border border-slate-200 rounded-2xl p-4 text-sm italic outline-none mb-4"></textarea>
                    <button onclick="postToSquare()" class="w-full bg-pink-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Post to Square</button>
                </section>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby-0JTMU0oqz8vF-do9hBhjoa6W95hPSHQV-PJxFGno7_aaKlxyh9WnBcP341_AqcM01A/exec";
        const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
        const rewardIcon = { cookie: "🍪", candy: "🍬", apple: "🍎" };
        const toNumber = (value, fallback = 0) => {
            const num = Number(value);
            return Number.isFinite(num) ? num : fallback;
        };

        async function apiGet(action, params = {}) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 12000);
            const url = new URL(API_URL);
            url.searchParams.set("action", action);
            Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
            try {
                const res = await fetch(url.toString(), { cache: "no-store", signal: controller.signal });
                const text = await res.text();
                if (!res.ok) throw new Error(text || `Request failed: ${res.status}`);
                return text ? JSON.parse(text) : {};
            } finally {
                clearTimeout(timeout);
            }
        }

        async function apiPost(payload) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 12000);
            try {
                await fetch(API_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
            } finally {
                clearTimeout(timeout);
            }
        }

        function setSync(active) {
            document.getElementById("syncStatus").classList.toggle("hidden", !active);
        }

        async function loadDashboard() {
            setSync(true);
            try {
                const data = await apiGet("getTeacherData");
                const submissions = Array.isArray(data.submissions) ? data.submissions : [];
                const students = Array.isArray(data.students) ? data.students : [];
                renderSubmissions(submissions);
                renderAnalytics(students);
                document.getElementById("pendingCount").innerText = `${submissions.length} PENDING`;
            } catch (e) {
                console.error(e);
                document.getElementById("submissionList").innerHTML = `<div class="text-center py-20 text-rose-500 font-black text-xs uppercase tracking-[0.2em]">Could not load class database</div>`;
                document.getElementById("analyticsGrid").innerHTML = "";
            } finally {
                setSync(false);
            }
        }

        function renderSubmissions(list) {
            const container = document.getElementById("submissionList");
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 font-black text-xs uppercase tracking-[0.4em]">No Submissions</div>`;
                return;
            }
            container.innerHTML = list.map((item, index) => {
                const studentName = item.username || item.studentName || item.name || "";
                const rewardType = item.rewardType || item.reward || "cookie";
                const rewardCount = Math.max(1, toNumber(item.rewardCount ?? item.rewardAmount, 1));
                return `
                <div class="submission-row flex items-center justify-between gap-4 p-6 bg-slate-50 border border-slate-100 rounded-3xl alert-pulse">
                    <div class="flex items-center gap-4 min-w-0">
                        <div class="text-3xl shrink-0">${escapeHtml(item.avatar || "👤")}</div>
                        <div class="min-w-0">
                            <p class="text-[10px] font-black text-indigo-500 uppercase">${escapeHtml(studentName)}</p>
                            <p class="text-sm font-bold break-words">Finished: "${escapeHtml(item.taskContent || item.content || "")}"</p>
                            <p class="text-[10px] font-black text-emerald-600 uppercase mt-2">Reward: ${escapeHtml(rewardIcon[rewardType] || "🎁")} × ${rewardCount}</p>
                        </div>
                    </div>
                    <button data-index="${index}" class="approve-btn bg-indigo-600 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-emerald-600 transition shadow-lg shrink-0">Approve for Claim</button>
                </div>
            `}).join("");
            container.querySelectorAll(".approve-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const item = list[Number(btn.dataset.index)];
                    approveIndividual(item, btn);
                });
            });
        }

        async function approveIndividual(item, btn) {
            const user = item.username || item.studentName || item.name;
            const taskId = item.taskId ?? item.id ?? item.taskID ?? item.TaskId;
            if (!user || !taskId) return alert("Missing student or task id.");
            const rewardType = item.rewardType || item.reward || "cookie";
            const rewardCount = Math.max(1, toNumber(item.rewardCount ?? item.rewardAmount, 1));
            btn.disabled = true;
            btn.innerText = "Approving...";
            setSync(true);
            try {
                await apiPost({
                    action: "approveTask",
                    username: user,
                    taskId,
                    status: "approved",
                    rewardType,
                    reward: rewardType,
                    rewardCount,
                    rewardAmount: rewardCount
                });
                alert(`Approved. ${user} can now claim ${rewardIcon[rewardType] || "🎁"} × ${rewardCount}.`);
                loadDashboard();
            } catch (e) {
                console.error(e);
                alert("Approval could not be sent. Please try again.");
                btn.disabled = false;
                btn.innerText = "Approve for Claim";
            } finally {
                setSync(false);
            }
        }

        function renderAnalytics(students) {
            const container = document.getElementById("analyticsGrid");
            if (students.length === 0) {
                container.innerHTML = `<div class="text-center py-12 opacity-20 font-black text-xs uppercase tracking-[0.3em]">No Students</div>`;
                return;
            }
            container.innerHTML = students.map(student => {
                const xp = Math.max(0, toNumber(student.xp, 0));
                const nextXp = Math.max(1, toNumber(student.nextXp, 100));
                const percent = Math.min(100, Math.round((xp / nextXp) * 100));
                return `
                    <div class="space-y-2">
                        <div class="flex justify-between text-[9px] font-black uppercase"><span>${escapeHtml(student.username || "")}</span><span>Lv.${escapeHtml(student.level || 1)}</span></div>
                        <div class="stat-bar"><div class="progress-fill bg-indigo-500" style="width: ${percent}%"></div></div>
                    </div>
                `;
            }).join("");
        }

        async function publishQuest() {
            const input = document.getElementById("taskContent");
            const content = input.value.trim();
            if (!content) return;
            const id = Date.now().toString();
            const rewardType = document.getElementById("rewardType").value;
            const rewardCount = Math.max(1, toNumber(document.getElementById("rewardCount").value, 1));
            setSync(true);
            try {
                await apiPost({
                    action: "publishTask",
                    id,
                    taskId: id,
                    content,
                    taskContent: content,
                    status: "open",
                    rewardType,
                    reward: `${rewardType}:${rewardCount}`,
                    rewardCount,
                    rewardAmount: rewardCount,
                    createdAt: new Date().toISOString()
                });
                input.value = "";
                alert("Quest broadcasted!");
                loadDashboard();
            } catch (e) {
                console.error(e);
                alert("Quest could not be sent. Please try again.");
            } finally {
                setSync(false);
            }
        }

        async function postToSquare() {
            const input = document.getElementById("socialText");
            const text = input.value.trim();
            if (!text) return;
            setSync(true);
            try {
                await apiPost({ action: "teacherPost", username: "Master", text, avatar: "👑" });
                input.value = "";
                alert("Sent!");
            } catch (e) {
                console.error(e);
                alert("Message could not be sent. Please try again.");
            } finally {
                setSync(false);
            }
        }

        window.addEventListener("load", loadDashboard);
    </script>
</body>
</html>
